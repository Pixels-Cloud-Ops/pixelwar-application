apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-proxy
  template:
    metadata:
      labels:
        app: nginx-proxy
    spec:
      hostNetwork: true # bind directement sur l'EC2
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              hostPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  nginx.conf: |
    server {
        listen 80;
        resolver kube-dns.kube-system.svc.cluster.local valid=10s;
        location /api/ {
            proxy_pass http://backend-service.default.svc.cluster.local:7009;
            proxy_set_header Host $host;
        }
        location / {
            proxy_pass http://frontend-service.default.svc.cluster.local:80;
            proxy_set_header Host $host;
        }
    }